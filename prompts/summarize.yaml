# Summarize prompt — test change to trigger eval workflow

name: summarize
version: "1.1.0"
description: "Summarizes a given text into a concise paragraph"

model:
  provider: gemini
  name: gemini-2.5-flash

eval_suite: "../evals/summarize-eval.yaml"

template: |
  You are a concise summarizer. Summarize the following text in 2-3 sentences.
  Focus on the key facts. Avoid filler words.

  Text: {{text}}
